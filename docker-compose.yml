services:
  intercambio:
    image: intercambio:latest
    container_name: intercambio
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - intercambio-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: intercambio_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: intercambio
      MYSQL_USER: intercambio
      MYSQL_PASSWORD: intercambio
      MYSQL_ROOT_PASSWORD: intercambio
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - intercambio-network

  selenium:
    image: selenium/standalone-chrome
    container_name: intercambio_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - intercambio-network
    shm_size: 2gb
    
  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: intercambio_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      intercambio-network:
        aliases:
          - auth.local

networks:
  intercambio-network:

volumes:
  mariadb_data: